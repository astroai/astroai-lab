extensions:
  memory:
    name: Knowledge Graph Memory
    cmd: npx
    args: [-y, "@modelcontextprotocol/server-memory"]
    enabled: true
    type: stdio
    timeout: 120
    envs:
      MEMORY_FILE_PATH: "${HOME}/.local/share/canfar-lab/agent/memory.jsonl"
  github:
    name: GitHub
    cmd: npx
    args: [-y, "@modelcontextprotocol/server-github"]
    enabled: true
    type: stdio
    timeout: 300
    envs:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
  fetch:
    name: Fetch
    cmd: uvx
    args: [mcp-server-fetch]
    enabled: true
    type: stdio
    timeout: 120

preferences:
  permission_mode: prompt
