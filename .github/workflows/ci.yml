name: CI

# Minimal remote gate — run ./scripts/ci.sh locally before pushing.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Pytest
        run: |
          uv sync --all-extras --quiet
          uv run pytest -q
